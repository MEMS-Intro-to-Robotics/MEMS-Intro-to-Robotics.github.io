site_name: MEMS Intro to Robotics
site_description: Public lab manuals, setup guides, and technical references for simulation-first robotics teaching.
docs_dir: docs
site_dir: site

watch:
  - guides
  - lab06_files
  - lab07_files
  - README.md

theme:
  name: material
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: custom
      accent: custom

plugins:
  - search

nav:
  - Home: index.md
  - Start Here:
      - Quick Start: guides/quick_start.md
      - Quick Reference: guides/quick_reference.md
  - Labs:
      - Lab 06: lab06_files/README.md
      - Lab 07: lab07_files/README.md
  - References:
      - Kinova Gen3 Lite + MoveIt 2: guides/kinova_gen3_lite_moveit2_guide.md
      - pymoveit2 API Guide: guides/pymoveit2_api_guide.md
  - For Educators: for-educators.md
  - Course Infrastructure:
      - Setup Scripts: guides/setup_scripts.md

not_in_nav: |
  guides/README.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
